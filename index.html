<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando FPT...</title>
    <script>
        // Si el ancho de la pantalla es mayor o igual a 1024px (PC / Escritorio)
        if (window.innerWidth >= 1024) {
            window.location.replace("desktop.html");
        } else {
            // Si el ancho es menor a 1024 (Móvil / Tablet pequeña)
            window.location.replace("mobile.html");
        }
    </script>
</head>

<body
    style="background-color: #f8fafc; color: #334155; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0;">
    <h2>Redireccionando...</h2>
</body>

</html>
