<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPT - Dashboard de Inventario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- html5-qrcode Library for Barcode Scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
    <div class="glass-bg"></div>

    <div class="app-container">
        <header>
            <div class="brand">
                <div class="logo-icon">FPT</div>
                <div class="brand-text">
                    <h1 id="login-trigger">Ferre-Pinturas Tinaquillo</h1>
                    <p id="live-clock">Cargando...</p>
                </div>
            </div>

            <main>
                <div class="controls">
                    <div class="controls-upper">
                        <div class="stat-card rate">
                            <img src="BCV.png" alt="BCV" class="rate-logo">
                            <div class="value-container">
                                <span class="label-black">TASA</span>
                                <span id="bcv-rate" class="value">0.00</span>
                                <div class="countdown-wrapper">
                                    <span id="rate-countdown" class="countdown-timer">00:00</span>
                                    <svg class="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 2v6h-6"></path>
                                        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                                        <path d="M3 22v-6h6"></path>
                                        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        <div class="filters-stack">
                            <select id="category-filter">
                                <option value="all">Todas las categorías</option>
                            </select>
                            <div class="currency-toggle" id="currency-filter">
                                <button class="toggle-btn active" data-value="usd">USD ($)</button>
                                <button class="toggle-btn" data-value="ves">VES (Bs.)</button>
                            </div>
                        </div>
                    </div>

                    <div class="search-wrapper">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="search-input" placeholder="Buscar productos por nombre o código..."
                            autocomplete="off">
                        <button id="add-product-trigger" class="add-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                                stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <button id="scan-trigger" class="scan-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                                </path>
                                <circle cx="12" cy="13" r="4"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="inventory-grid" id="products-grid">
                    <!-- Las tarjetas de productos se cargarán aquí -->
                </div>
                <div id="loader" class="loader-container">
                    <div class="spinner"></div>
                    <p>Sincronizando con Supabase...</p>
                </div>
            </main>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>Iniciar Sesión</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="admin" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required>
                </div>
                <button type="submit" class="login-btn">Acceder al Sistema</button>
            </form>
            <div id="logged-in-actions" style="display: none; flex-direction: column; gap: 1rem;">
                <p style="text-align: center; color: #1e293b; font-weight: 600;">Sessión iniciada como Admin</p>
                <button id="logout-btn" class="logout-btn">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <!-- Barcode Scanner Modal -->
    <div id="scanner-modal" class="modal">
        <div class="modal-content glass-card scanner-container">
            <div class="modal-header">
                <h2>Escanear Código</h2>
                <button id="close-scanner" class="close-btn">&times;</button>
            </div>
            <div id="reader"></div>
            <p class="scanner-tip">Coloca el código frente a la cámara</p>
        </div>
    </div>

    <!-- Product Form Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content glass-card form-container"
            style="display: flex; flex-direction: column; overflow: hidden; justify-content: center; align-items: center;">

            <form id="product-form"
                style="display: flex; flex-direction: column; overflow: hidden; width: 100%; max-width: 650px;">
                <input type="hidden" id="p-id">
                <div class="form-grid" style="overflow-y: auto; width: 100%; padding: 1rem 0;">

                    <div class="form-group full">
                        <label>Nombre del Producto</label>
                        <input type="text" id="p-name" required placeholder="Ej: Pintura Caucho Blanco">
                    </div>
                    <div class="form-group full">
                        <label>Código de Barras</label>
                        <div class="scan-input-wrapper"
                            style="position: relative; width: 100%; display: flex; align-items: center;">
                            <input type="text" id="p-barcode" placeholder="Escanea o escribe"
                                style="padding-right: 4rem;">
                            <button type="button" id="scan-form-trigger" class="scan-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path
                                        d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                                    </path>
                                    <circle cx="12" cy="13" r="4"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group full">
                        <label>Categoría</label>
                        <select id="p-category"
                            style="width:100%; padding:0.85rem; border:2px solid #e2e8f0; border-radius:12px; font-family:inherit;">
                            <option value="VARIOS">VARIOS</option>
                            <option value="PINTURA">PINTURA</option>
                            <option value="HERRAMIENTAS">HERRAMIENTAS</option>
                            <option value="PLOMERIA">PLOMERIA</option>
                            <option value="ELECTRICIDAD">ELECTRICIDAD</option>
                            <option value="CONSTRUCCION">CONSTRUCCION</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Precio Base ($) - Para VES</label>
                        <input type="number" id="p-cost" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Precio Divisa ($) - Para USD</label>
                        <input type="number" id="p-sale-price" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Stock Actual</label>
                        <input type="number" id="p-stock" required>
                    </div>
                    <div class="form-group">
                        <label>Stock Mínimo</label>
                        <input type="number" id="p-min-stock" value="5">
                    </div>
                </div>
                <div class="form-actions" style="flex-shrink: 0; margin: 0 auto 5vh; width: 100%;">
                    <button type="button" class="btn btn-cancel" id="cancel-product-btn">Cancelar</button>
                    <button type="submit" class="btn btn-save" id="save-product-btn">Guardar</button>
                </div>
            </form>

        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
